<div class="header">
  <mat-toolbar color="primary">
    <mat-toolbar-row>
      <button
        class="sidenav-button"
        mat-icon-button
        (click)="onSidebartoggle()"
        matTooltip="Menu"
        matTooltipClass="example-tooltip"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <button
        mat-icon-button
        color="ascent"
        class="mat-button"
        matTooltip="Home"
        matTooltipClass="example-tooltip"
        routerLink="/home"
      >
        <mat-icon>home</mat-icon>
      </button>
      <div fxFlex fxLayout="row" fxLayoutAlign="flex-end">
        <mat-action-list fxLayout="row" fxGap="20px">
          <mat-list-item *ngFor="let date of timeService.getDate">
            <h1 align="center">{{ date.hour }}:{{ date.minute }}</h1>
          </mat-list-item>
        </mat-action-list>
        <button
          mat-icon-button
          matTooltip="Reload Time"
          matTooltipClass="example-tooltip"
          (click)="onReload()"
        >
          <mat-icon>access_time</mat-icon>
        </button>
        <button
          mat-icon-button
          class="sidenav-button"
          [matMenuTriggerFor]="menu"
          matTooltip="Sign Up"
          matTooltipClass="example-tooltip"
        >
          <mat-icon>person_outline</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <mat-card>
            <mat-card-title>Sign Up</mat-card-title>
            <mat-card-content> </mat-card-content>
            <mat-card-actions>
              <a
                href="https://benion-tech.herokuapp.com/benion-users/benion-users-register/"
              >
                <button
                  mat-menu-item
                  matTooltip="Create New User"
                  matTooltipClass="example-tooltip"
                  (click)="onCreate()"
                >
                  <span>Create An Account</span>
                  <mat-icon>add_box</mat-icon>
                </button>
              </a>
              <a
                href="https://benion-tech.herokuapp.com/benion-users/benion-users-login/"
              >
                <button mat-menu-item>
                  <mat-icon>person_outline</mat-icon>
                  Log In
                </button>
              </a>
              <a
                href="https://benion-tech.herokuapp.com/benion-users/benion-users-logout/"
              >
                <button mat-menu-item>
                  <mat-icon>exit_to_app</mat-icon>
                  Sign Out
                </button>
              </a>
            </mat-card-actions>
          </mat-card>
        </mat-menu>
        <button
          mat-button
          [matMenuTriggerFor]="settings"
          matTooltip="Settings"
          matTooltipClass="example-tooltip"
        >
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #settings="matMenu">
          <button mat-menu-item>
            <span>Share</span>
            <mat-icon>publish</mat-icon>
          </button>
          <button mat-menu-item disabled>
            <span>Comment</span>
            <mat-icon>mode_comment</mat-icon>
          </button>
          <button mat-menu-item>
            <span>Delete Account</span>
            <mat-icon>delete</mat-icon>
          </button>
        </mat-menu>
      </div>
    </mat-toolbar-row>
  </mat-toolbar>
</div>
